name: release

# Manual trigger only — only repo owners can deploy to crates.io.
# Go to Actions → Release → Run workflow, select a tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.21.0)'
        required: true
        type: string

# Sequential releases — don't cancel in-progress, just queue.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

# Default to read-only; the github-release job widens to
# `contents: write` (required by softprops/action-gh-release).
permissions: read-all

jobs:
  # Run full test suite before publishing.
  # Tags can be pushed from any branch, so we verify here.
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets
      - run: cargo build --release

  # Publish to crates.io using API token.
  # Set CARGO_REGISTRY_TOKEN in repo secrets.
  publish:
    name: publish-to-crates-io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create GitHub release with auto-generated notes.
  github-release:
    name: github-release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Extract version from input
        id: get_version
        run: echo "VERSION=${{ github.event.inputs.tag }}" | sed 's/^v//' >> "$GITHUB_OUTPUT"

      # Extract changelog section for this version.
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Find the section for this version in CHANGELOG.md
          awk "/^## \\[$VERSION\\]/ {found=1; next} /^## \\[/ {found=0} found" CHANGELOG.md > RELEASE_NOTES.md || true
          # If empty, use generic message
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See CHANGELOG.md for release notes." > RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.inputs.tag }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
