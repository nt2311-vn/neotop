name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so PR retries don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Cross-platform build verification — ensures code compiles on macOS
  # even though Linux has the full feature set.  This job is
  # **blocking**: a macOS regression must fail CI, otherwise
  # `cargo install neotop` silently breaks for Apple users (see
  # 0.24.2 changelog for the regression that motivated this).
  check-macos:
    name: check (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build (macOS)
        run: cargo build --locked

      - name: cargo clippy (macOS)
        run: cargo clippy --all-targets --locked -- -D warnings

  # Fast cross-compile sanity check from Linux runners.  Catches
  # macOS compile errors in seconds without waiting for a macOS
  # runner slot.  Belt-and-braces: runs alongside `check-macos`.
  cross-check-darwin:
    name: cross-check (aarch64-apple-darwin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: cargo check --target aarch64-apple-darwin
        run: cargo check --target aarch64-apple-darwin --locked

      - name: cargo clippy --target aarch64-apple-darwin
        run: cargo clippy --target aarch64-apple-darwin --locked -- -D warnings

  check:
    name: check (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `1.88` is the declared MSRV in Cargo.toml — bumped from
        # 1.80 because transitive deps (darling 0.23, instability
        # 0.3.12, unicode-segmentation 1.13) now require it.
        # `stable` keeps us honest about the latest compiler too.
        rust: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo build (release)
        run: cargo build --release --locked

  # Supply-chain + SAST + advisory scan. Runs in parallel with
  # `check` — independent failures don't block each other.
  #
  # *Why no valgrind?* The codebase only uses `unsafe` for
  # necessary macOS FFI (sysctl, libproc) with validated inputs.
  # Rust's ownership model rules out the use-after-free, double-free, and
  # raw-pointer leak classes valgrind exists to catch. Running it
  # over `cargo test` mostly produces noise from libstd's allocator
  # caching and libnvml's dlopen path. The Rust-native equivalents
  # that *do* find things in this codebase — `cargo audit`,
  # `cargo deny`, and (for any future `unsafe` we add) `cargo miri`
  # — are wired up below. If we ever introduce raw FFI of our own,
  # add a separate `miri` job at that point.
  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for Semgrep's SARIF upload to the security tab on
      # public repos. Harmless on private repos that disable it.
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Bust the cache when the lockfile or deny config moves —
          # both directly affect the audit / deny verdicts.
          shared-key: security
          key: ${{ hashFiles('Cargo.lock', 'deny.toml') }}

      # cargo-audit — the canonical RustSec advisory DB scan.
      # Runs directly (not via rustsec/audit-check action) to avoid
      # the action's GITHUB_TOKEN check-run permission issue.
      # Ignored advisories are waived in deny.toml; we pass the
      # same IDs here so audit doesn't warn on known transitive deps.
      - name: cargo audit
        run: |
          cargo install cargo-audit
          cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002

      # cargo-deny — supply-chain policy: licenses, duplicate
      # versions, banned crates, sources, advisories. Stricter
      # than audit. Configured in `deny.toml` at the repo root.
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

      # Semgrep SAST — Rust + secrets + general security-audit
      # rule packs. No token required for the OSS rule packs;
      # bring-your-own-token via SEMGREP_APP_TOKEN unlocks the
      # Semgrep Cloud dashboard. Known FFI false positives are
      # excluded via .semgrepignore. Non-blocking so new findings
      # surface in logs without failing the pipeline.
      - name: semgrep
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/rust
            p/security-audit
            p/secrets
        env:
          # Optional — only set in repo secrets if you've
          # connected to Semgrep Cloud. Action runs fine without.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # No Snyk step. Snyk does not support Rust:
      #   * They removed `snyk/actions/rust@master` from their
      #     Supported Actions in 2024 (only Node, Python, Ruby,
      #     Go, Maven, Gradle, PHP, .NET, etc. remain).
      #   * The CLI itself errors with "Could not detect package
      #     manager for file: Cargo.lock" — there is no Cargo
      #     plugin.
      # `cargo audit` above already covers the same advisory DB
      # Snyk would, and `cargo deny` covers the license / dup-dep
      # surface their Open Source product would. The CodeQL and
      # Scorecard workflows in this repo cover SAST and supply-
      # chain best-practices respectively. Snyk would add zero
      # coverage for this codebase.
