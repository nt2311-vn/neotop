name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so PR retries don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Cross-platform build verification — ensures code compiles on macOS
  # even though Linux has the full feature set.
  check-macos:
    name: check (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      # macOS build verifies cross-platform compilation.
      # Full functionality is Linux-only; macOS stubs return empty data.
      - name: cargo build (macOS)
        run: cargo build --locked
        continue-on-error: true

      - name: cargo clippy (macOS)
        run: cargo clippy --all-targets --locked -- -D warnings
        continue-on-error: true

  check:
    name: check (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `1.88` is the declared MSRV in Cargo.toml — bumped from
        # 1.80 because transitive deps (darling 0.23, instability
        # 0.3.12, unicode-segmentation 1.13) now require it.
        # `stable` keeps us honest about the latest compiler too.
        rust: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo build (release)
        run: cargo build --release --locked
