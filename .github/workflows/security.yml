name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

# Run independently of CI — security findings don't block build checks.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only; this workflow does not need any write scope
# now that the (deprecated) Semgrep SARIF upload has been dropped.
permissions: read-all

jobs:
  scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          # Bust the cache when the lockfile or deny config moves —
          # both directly affect the audit / deny verdicts.
          shared-key: security
          key: ${{ hashFiles('Cargo.lock', 'deny.toml') }}

      # cargo-audit — the canonical RustSec advisory DB scan.
      # Runs directly (not via rustsec/audit-check action) to avoid
      # the action's GITHUB_TOKEN check-run permission issue.
      # Ignored advisories are waived in deny.toml; we pass the
      # same IDs here so audit doesn't warn on known transitive deps.
      - name: cargo audit
        run: |
          cargo install cargo-audit
          cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002

      # cargo-deny — supply-chain policy: licenses, duplicate
      # versions, banned crates, sources, advisories. Stricter
      # than audit. Configured in `deny.toml` at the repo root.
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.9
        with:
          command: check advisories licenses bans sources

      # Semgrep SAST — Rust + secrets + general security-audit
      # rule packs. No token required for the OSS rule packs;
      # bring-your-own-token via SEMGREP_APP_TOKEN unlocks the
      # Semgrep Cloud dashboard. Known FFI false positives are
      # excluded via .semgrepignore. Non-blocking so new findings
      # surface in logs without failing the pipeline.
      - name: semgrep
        # semgrep/semgrep-action is archived/deprecated upstream as of
        # 2024. Pinned for reproducibility; plan to migrate to a direct
        # `semgrep ci` invocation or rely on CodeQL.
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        continue-on-error: true
        with:
          config: >-
            p/rust
            p/security-audit
            p/secrets
        env:
          # Optional — only set in repo secrets if you've
          # connected to Semgrep Cloud. Action runs fine without.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # No Snyk step. Snyk does not support Rust:
      #   * They removed `snyk/actions/rust@master` from their
      #     Supported Actions list in 2024 (only Node, Python, Ruby,
      #     Go, Maven, Gradle, PHP, .NET, etc. remain).
      #   * The CLI itself errors with "Could not detect package
      #     manager for file: Cargo.lock" — there is no Cargo
      #     plugin.
      # `cargo audit` above already covers the same advisory DB
      # Snyk would, and `cargo deny` covers the license / dup-dep
      # surface their Open Source product would. The CodeQL and
      # Scorecard workflows in this repo cover SAST and supply-
      # chain best-practices respectively. Snyk would add zero
      # coverage for this codebase.

      # No Valgrind. The codebase only uses `unsafe` for
      # necessary macOS FFI (sysctl, libproc) with validated inputs.
      # Rust's ownership model rules out the use-after-free, double-free,
      # and raw-pointer leak classes valgrind exists to catch.
      # The Rust-native equivalents that *do* find things here
      # (`cargo audit`, `cargo deny`, `cargo miri` if we ever add
      # raw FFI) are wired up above.
