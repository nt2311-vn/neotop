# cargo-deny configuration — supply-chain policy for `cargo deny check`.
#
# Why each section matters here:
#
#   * `advisories` — surfaces the same RustSec DB cargo-audit reads,
#     but with stricter defaults (yanked = deny by default in
#     newer cargo-deny). We keep `yanked = warn` so a yanked dep
#     fails CI loudly without blocking unrelated PRs while we
#     swap it.
#
#   * `licenses` — neotop is Apache-2.0; we only pull crates whose
#     licenses are SPDX-compatible with that. The allow list is
#     deliberately conservative — anything else needs a deliberate
#     opt-in here, not silently in `cargo add`.
#
#   * `bans` — catches duplicate transitive dep versions (most
#     common cause of binary bloat) and wildcard `*` version reqs
#     (which are an upgrade-roulette footgun in libraries).
#
#   * `sources` — locks the supply chain to crates.io. Any git
#     dep would have to be allow-listed by URL here, which is the
#     review surface we want.
#
# Run: `cargo deny check`
# Subset: `cargo deny check advisories licenses bans sources`

[graph]
# Match the platforms we actually build for. Both Linux and macOS
# are first-class targets now.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

# -----------------------------------------------------------------------------
# Advisories — RustSec DB
# -----------------------------------------------------------------------------

[advisories]
version = 2
yanked = "warn"
# Active waivers — every entry pins the *transitive* root that
# blocks us from fixing it ourselves and a review-by trigger.
# Anything else gets fixed, not waived.
ignore = [
    # `paste 1.0.15` — RUSTSEC-2024-0436. Author archived the
    # repo; crate is functionally complete. We pull it via
    # ratatui 0.29 → no direct call sites in our code. Drop this
    # waiver when ratatui migrates to `pastey` (track:
    # https://github.com/ratatui/ratatui/issues — search "paste").
    "RUSTSEC-2024-0436",
    # `lru 0.12.5` — RUSTSEC-2026-0002. `IterMut` invalidates an
    # internal pointer (Stacked Borrows violation). Pulled via
    # ratatui 0.29; we don't call IterMut on lru anywhere. Drop
    # when ratatui bumps to lru ≥ 0.13.
    "RUSTSEC-2026-0002",
]

# -----------------------------------------------------------------------------
# Licenses
# -----------------------------------------------------------------------------

[licenses]
version = 2
# Anything outside this list fails CI.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8
# Some crates publish dual licenses; cargo-deny picks the first
# one in the SPDX expression that matches `allow`. No exception
# overrides needed today.
exceptions = []

# -----------------------------------------------------------------------------
# Bans — duplicate versions, wildcards, banned crates
# -----------------------------------------------------------------------------

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Strict ban list. Empty for now — we'd add openssl-sys here if
# we ever needed to force rustls-only, for example.
deny = []
# Crates with known multiple-version drift in our tree. Not
# blocking; just acknowledged so the warning is informational.
skip = []
skip-tree = []

# -----------------------------------------------------------------------------
# Sources — registry / git allow lists
# -----------------------------------------------------------------------------

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
